# Секреты передаются через переменные окружения BROWSERSTACK_USER / BROWSERSTACK_KEY
# (или системными свойствами с теми же именами: -DBROWSERSTACK_USER=... -DBROWSERSTACK_KEY=...)
# custom_id загруженного apk (или bs://<app_url> из ответа BrowserStack на загрузку)
app=habitica-android
project=Habitica diploma tests
build=habitica-mobile

# Профили устройств BrowserStack: выбор через -Dphone=pixel|samsung|xiaomi
phone=pixel
device.pixel.name=Google Pixel 7
device.pixel.osVersion=13.0
device.samsung.name=Samsung Galaxy S22
device.samsung.osVersion=12.0
device.xiaomi.name=Xiaomi Redmi Note 11
device.xiaomi.osVersion=11.0
