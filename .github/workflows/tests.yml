name: tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'images/**'
  workflow_dispatch:
    inputs:
      task:
        description: 'Слой тестов (all = api + web + mobile)'
        type: choice
        default: web_test
        options:
          - api_test
          - web_test
          - mobile_test
          - test
          - all

permissions:
  contents: write

concurrency:
  group: tests-${{ github.ref }}

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # web бежит в headless Chrome раннера (предустановлен) — Selenoid не нужен;
      # лишние свойства для api/mobile безвредны; all = test (api+web) + mobile_test
      - name: Run ${{ github.event.inputs.task || 'api_test' }}
        run: >
          ./gradlew ${{ github.event.inputs.task == 'all' && 'test mobile_test' || github.event.inputs.task || 'api_test' }}
          --continue
          -Dheadless=true
          -DBROWSERSTACK_USER=${{ secrets.BROWSERSTACK_USER }}
          -DBROWSERSTACK_KEY=${{ secrets.BROWSERSTACK_KEY }}

      - name: Checkout gh-pages for Allure history
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # history из прошлого отчёта подкладывается в results — так Allure строит тренды
      - name: Build Allure report with history
        if: always()
        run: |
          curl -sLo allure.tgz https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.29.0/allure-commandline-2.29.0.tgz
          tar -xzf allure.tgz
          mkdir -p build/allure-results
          if [ -d gh-pages/history ]; then cp -r gh-pages/history build/allure-results/history; fi
          allure-2.29.0/bin/allure generate build/allure-results -o allure-report --clean

      - name: Publish Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Telegram notification
        if: always()
        continue-on-error: true
        run: |
          wget -q https://github.com/qa-guru/allure-notifications/releases/download/4.11.0/allure-notifications-4.11.0.jar
          mkdir -p notifications
          cat > notifications/config.json <<EOF
          {
            "base": {
              "logo": "",
              "project": "${{ github.repository }}",
              "environment": "GitHub Actions",
              "reportLink": "https://menand.github.io/Qa.Guru.40.Diploma/",
              "comment": "задача: ${{ github.event.inputs.task || 'api_test' }} (${{ github.event_name }})",
              "language": "ru",
              "allureFolder": "allure-report",
              "enableChart": true
            },
            "telegram": {
              "token": "${{ secrets.TELEGRAM_TOKEN }}",
              "chat": "${{ secrets.TELEGRAM_CHAT }}",
              "replyTo": ""
            }
          }
          EOF
          java "-DconfigFile=notifications/config.json" -jar allure-notifications-4.11.0.jar
